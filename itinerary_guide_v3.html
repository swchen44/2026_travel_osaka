<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎙️ 導遊版行程手冊 v3 · Fox 家 2026 關西之旅</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --green: #2d7d46; --green-dark: #1a3a1a;
    --osaka: #c03030; --mic: #6b4d9e; --mic-bg: #f4efff;
    --text: #1f1f1f; --sub: #555; --border: #e6e6e6; --bg: #f6f5f3;
    --shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; overflow-x: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Noto Sans TC', 'PingFang TC', sans-serif;
    background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.7;
    -webkit-text-size-adjust: 100%;
  }
  h1, p, div, span, td, th, li, a { overflow-wrap: break-word; word-break: break-word; }

  /* Header */
  header {
    background: linear-gradient(135deg, #1a3a1a 0%, #2d7d46 60%, #3a9960 100%);
    color: #fff; padding: 15px 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header .logo { font-size: 1.9rem; flex-shrink: 0; }
  header .htitle { flex: 1; min-width: 200px; }
  header h1 { font-size: 1.3rem; font-weight: 800; }
  header p { font-size: 0.82rem; opacity: 0.9; margin-top: 4px; }
  header .right { display: flex; gap: 8px; flex-wrap: wrap; }
  .hbadge { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
    color: #fff; border-radius: 20px; padding: 6px 13px; font-size: 0.82rem; font-weight: 700; text-decoration: none; white-space: nowrap; }
  .hbadge:hover { background: rgba(255,255,255,0.34); }

  /* Filter bar */
  #filter-bar {
    background: #fff; border-bottom: 1px solid #ddd; padding: 9px 16px;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    position: sticky; top: 0; z-index: 600;
  }
  #filter-bar .lbl { font-size: 0.85rem; color: var(--sub); font-weight: 700; }
  .filter-btn {
    border: 1.5px solid #ccc; background: #fff; border-radius: 22px;
    padding: 6px 14px; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; color: #333; font-weight: 600;
  }
  .filter-btn.active, .filter-btn:hover { color: #fff; }

  /* Two-pane：地圖 sticky 釘住，整頁自然捲動（避免內層捲動把內容藏住） */
  #main { display: flex; align-items: flex-start; }
  #map-pane { flex: 0 0 48%; position: sticky; top: 41px; height: calc(100vh - 41px); }
  #map { width: 100%; height: 100%; }
  #sidebar { flex: 1; padding: 14px; display: flex; flex-direction: column; gap: 14px; min-width: 0; }
  #count-label { font-size: 0.85rem; color: var(--sub); padding: 0 2px; font-weight: 600; }

  /* Day section header */
  .day-head {
    color: #fff; border-radius: 10px; padding: 10px 15px; font-weight: 800;
    font-size: 1rem; box-shadow: var(--shadow);
  }

  /* Spot card */
  .card {
    background: #fff; border-radius: 12px; box-shadow: var(--shadow);
    overflow: hidden; border-left: 5px solid #ccc; transition: box-shadow 0.15s;
  }
  .card.selected { box-shadow: 0 6px 22px rgba(0,0,0,0.22); }
  .card-head { display: flex; gap: 12px; padding: 12px; cursor: pointer; align-items: flex-start; }
  .photo-wrap {
    width: 108px; height: 90px; border-radius: 10px; flex-shrink: 0; overflow: hidden;
    position: relative; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #e8efe9, #d7e3da); color: #9aa; font-size: 2rem;
  }
  .photo-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .card-body { flex: 1; min-width: 0; }
  .card-name { font-size: 1.02rem; font-weight: 800; color: var(--text); line-height: 1.35; }
  .card-type { font-size: 0.8rem; color: var(--sub); margin-top: 3px; }
  .card-meta { font-size: 0.84rem; color: #444; margin-top: 5px; line-height: 1.6; }
  .card-meta a { color: var(--osaka); text-decoration: none; font-weight: 700; }
  .card-meta a:hover { text-decoration: underline; }
  .flag-tag {
    display: inline-block; background: #fff3e0; color: #e65100;
    border-radius: 8px; padding: 2px 9px; font-size: 0.76rem; font-weight: 700; margin-top: 6px;
  }
  .card-toggle { font-size: 0.78rem; color: #fff; background: var(--green); border-radius: 16px;
    padding: 4px 10px; flex-shrink: 0; align-self: center; font-weight: 700; white-space: nowrap; }

  .card-detail { display: none; padding: 0 12px 13px; }
  .card.open .card-detail { display: block; }
  .guide {
    position: relative; background: var(--mic-bg); border-left: 4px solid var(--mic);
    border-radius: 0 10px 10px 0; padding: 12px 14px 12px 16px; margin: 6px 0 12px;
    font-size: 0.9rem; line-height: 1.78; color: #352c4d;
  }
  .guide::before {
    content: "🎙️"; position: absolute; top: -11px; left: -2px; font-size: 16px;
    background: #fff; border-radius: 50%; padding: 1px 3px;
  }
  .guide p { margin: 0 0 10px; }
  .guide p:last-child { margin-bottom: 0; }
  .guide strong { color: var(--mic); }
  .embed-map { width: 100%; height: 210px; border: 0; border-radius: 10px; background: #eee; display: block; }
  .card-links { display: flex; gap: 8px; margin-top: 11px; flex-wrap: wrap; }
  .link-btn {
    text-decoration: none; border-radius: 8px; padding: 8px 13px; font-size: 0.83rem;
    font-weight: 700; color: #fff; display: inline-flex; align-items: center; gap: 5px;
  }
  .link-btn:hover { opacity: 0.86; }
  .btn-gmap { background: #4285F4; } .btn-dir { background: #34A853; }
  .btn-wiki { background: #777; }

  /* 資訊面板（放在 sidebar 末端） */
  .panel { background: #fff; border-radius: 12px; box-shadow: var(--shadow); padding: 4px 16px 14px; }
  .sec-h { font-size: 0.96rem; font-weight: 800; color: var(--green); padding-top: 13px; margin-bottom: 5px; }
  table { width: 100%; border-collapse: collapse; margin: 7px 0; font-size: 0.85rem; }
  th, td { border: 1px solid var(--border); padding: 7px 9px; text-align: left; vertical-align: top; }
  th { background: #f4f1ee; font-weight: 700; color: #444; }
  td a { color: var(--osaka); text-decoration: none; font-weight: 700; }
  .meal-day { font-weight: 800; color: var(--osaka); margin-top: 11px; font-size: 0.88rem; }
  .meal-row { font-size: 0.85rem; color: #444; margin: 3px 0 3px 4px; line-height: 1.6; }
  .meal-row a { color: var(--osaka); text-decoration: none; font-weight: 700; }
  .checklist { list-style: none; padding: 0; }
  .checklist li { padding: 7px 0 7px 28px; position: relative; font-size: 0.86rem; border-bottom: 1px solid #f0f0f0; line-height: 1.6; }
  .checklist li::before { content: "☐"; position: absolute; left: 4px; top: 6px; color: var(--green); font-size: 1.05rem; }
  .note { font-size: 0.78rem; color: #999; text-align: center; line-height: 1.9; padding: 6px 4px 0; }
  .footer { text-align: center; color: #aaa; font-size: 0.8rem; padding: 14px 0 40px; }

  /* ── 手機版：上下排列，地圖在上方 sticky，整頁捲動 ── */
  @media (max-width: 820px) {
    #main { flex-direction: column; }
    #map-pane { flex: none; width: 100%; position: sticky; top: 41px; height: 44vh; min-height: 280px; z-index: 500; box-shadow: 0 3px 10px rgba(0,0,0,0.18); }
    #sidebar { width: 100%; }
  }
  @media (max-width: 430px) {
    header h1 { font-size: 1.18rem; }
    .photo-wrap { width: 92px; height: 82px; }
    .embed-map { height: 190px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🎙️</div>
  <div class="htitle">
    <h1>導遊版行程手冊 v3</h1>
    <p>Fox 家 2026 關西之旅 ｜ 7/13–7/18 · 6天5夜 ｜ 點地圖標記或卡片，看照片・導遊解說・嵌入地圖</p>
  </div>
  <div class="right">
    <a class="hbadge" href="index.html">← 回首頁</a>
    <a class="hbadge" href="itinerary_guide_v3.md">📄 純文字版</a>

</header>

<div id="filter-bar">

    <div id="count-label"></div>

</div>

<script>
// ── 天數設定 ──────────────────────────────────────────────

  fushimi:  'https://upload.wikimedia.org/wikipedia/commons/thumb/6/64/Fushimiinari-taisha%2C_gehaiden-1.jpg/500px-Fushimiinari-taisha%2C_gehaiden-1.jpg',
  kiyomizu: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Kiyomizu-dera%2C_Kyoto%2C_November_2016_-02.jpg/500px-Kiyomizu-dera%2C_Kyoto%2C_November_2016_-02.jpg',

  kasuga:   'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Kasuga-taisha%2C_chumon-1.jpg/500px-Kasuga-taisha%2C_chumon-1.jpg',

  todaiji:  'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/%E6%9D%B1%E5%A4%A7%E5%AF%BA_%E5%A4%A7%E4%BB%8F%E6%AE%BF%EF%BC%882024%E5%B9%B4%EF%BC%89.jpg/500px-%E6%9D%B1%E5%A4%A7%E5%AF%BA_%E5%A4%A7%E4%BB%8F%E6%AE%BF%EF%BC%882024%E5%B9%B4%EF%BC%89.jpg',
  dotonbori:'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Dotonburi_River_Namba_Japan_by_Don_Ramey_Logan.jpg/500px-Dotonburi_River_Namba_Japan_by_Don_Ramey_Logan.jpg',
  'uniqlo-osaka': 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/Uniqlo_Ginza_2018.jpg/500px-Uniqlo_Ginza_2018.jpg',
  parco:    'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Shinsaibashi_Osaka_Japan01-r.jpg/500px-Shinsaibashi_Osaka_Japan01-r.jpg',

  'umeda-sky':'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f9/2018_Umeda_Sky_Building.jpg/500px-2018_Umeda_Sky_Building.jpg',
  usj:      'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Universal_Studios_Japan_2019%2C08.jpg/500px-Universal_Studios_Japan_2019%2C08.jpg',

};

// ── 景點資料 ──────────────────────────────────────────────
const SPOTS = [
  { id:'hotel', day:0, emoji:'🏨', name:'Swissôtel Nankai Osaka', type:'飯店｜難波・高島屋正上方',
    lat:34.66237, lng:135.50183, wiki:'', wikiLang:'ja',
    meta:'📞 <a href="tel:0666461111">06-6646-1111</a>｜大阪市中央区難波 5-1-60｜訂位 QLRSGZRT',
    guide:[`我們今晚入住的是 <strong>Swissôtel Nankai Osaka</strong>，位置真的是絕佳！這棟樓就是難波最地標性的建築之一——<strong>高島屋百貨的正上方</strong>，直接蓋在百貨頂樓。飯店本身是瑞士品牌，採瑞士現代設計風格，從客房往下看就是整個難波的夜景。我們訂的是兩間 <strong>Swiss Select Twin 連通房</strong>，四個人住非常方便。`,
          `飯店旁邊步行 5 分鐘就是道頓堀，10 分鐘到心齋橋，地鐵站就在樓下，交通位置一等一的方便。明天開始我們就以這裡為基地，每天出發冒險！`] },

  { id:'fushimi', day:1, emoji:'⛩️', name:'伏見稻荷大社', type:'景點｜全日本稻荷神社總本社（711 年）',
    lat:34.96712, lng:135.77268, wiki:'伏見稲荷大社', wikiLang:'ja',
    meta:'📞 <a href="tel:0756417331">075-641-7331</a>｜京都市伏見区深草薮之内町 68｜24 小時・免費',
    guide:[`好，各位，我們現在到的地方是 <strong>伏見稻荷大社</strong>，這裡是全日本約 <strong>三萬座稻荷神社的總本社</strong>，創建於西元 <strong>711 年</strong>，距今已超過 <strong>1,300 年</strong>！`,
          `這裡最有名的就是那條 <strong>千本鳥居</strong>——實際上整座山上的鳥居加起來約有 <strong>一萬座</strong>，是江戶時代開始，生意成功的商人、許願成真的信徒一座一座捐獻的。每一座鳥居後面都刻有捐獻者的名字和日期。`,
          `這裡供奉的是 <strong>稻荷神</strong>，掌管農業豐收、商業繁榮。神社裡的狐狸不是被拜的對象，<strong>狐狸是稻荷神的使者</strong>——嘴裡咬鑰匙代表米倉的鑰匙，咬寶珠代表神明的功德。`,
          `今天時間有限，建議走到「<strong>奧社奉拜所</strong>」（約 30-40 分鐘），那裡有有名的「願之石」，搬起來很輕就代表心願能實現！早上 8 點以前人最少，拍照完全沒人潮，大家把握一下！`] },

  { id:'kiyomizu', day:1, emoji:'🏯', name:'清水寺', type:'景點｜世界遺產・懸空舞台（778 年）',
    lat:34.99491, lng:135.78492, wiki:'清水寺', wikiLang:'ja',
    meta:'📞 <a href="tel:0755511234">075-551-1234</a>｜京都市東山区清水 1-294｜06:00–18:00｜門票 ¥400',
    guide:[`我們現在要去的是 <strong>清水寺</strong>，西元 <strong>778 年</strong>創建，距今超過 <strong>1,200 年</strong>。名字由來很浪漫——山上有一道清澈的瀑布，僧人延鎮在夢中受神諭指引，在瀑布邊建寺，就以泉水命名為「清水寺」。`,
          `最壯觀的是 <strong>清水舞台</strong>，懸空伸出山崖的木造平台，由 <strong>139 根圓木</strong>支撐，約 13 公尺高（4 層樓）。最厲害的是<strong>完全沒有用一根釘子</strong>，純靠榫接，是日本傳統工法「懸造」的代表作。`,
          `日本有句老話「<strong>從清水舞台跳下去</strong>」，意思是「背水一戰、豁出去了」——江戶時代真的有人相信跳下去能實現心願，史書記載過 234 次！當然現在已禁止。`,
          `下山一定要去 <strong>音羽瀑布</strong>，三道水流分別代表 <strong>長壽・戀愛・學業</strong>。注意只能選一道喝，喝全部反而沒效喔！沿途的 <strong>三年坂・二年坂</strong> 是京都保存最完整的江戶街景，還有全世界唯一有榻榻米座位的星巴克！`] },

  { id:'tenryuji', day:1, emoji:'🍽️', name:'嵐山 天龍寺・精進料理 Shigetsu', type:'世界遺產禪寺＋午餐｜蛋奶素',

    meta:'📞 <a href="tel:0758829725">075-882-9725</a>（需預約）｜11:00-14:00｜¥3,500 起',
    guide:[`今天午餐安排了一個特別體驗——<strong>精進料理（Shojin Ryori）</strong>，日本禪宗寺院流傳下來的素食料理，從鎌倉時代就有，至今 800 年歷史。`,

          `用餐的 <strong>天龍寺</strong> 是嵐山最重要的禪寺，足利尊氏在 <strong>1339 年</strong>為超渡後醍醐天皇而建，是世界遺產，曹源池庭園是日本史上第一個特別史蹟・特別名勝雙重認定的庭園。窗外就是 700 年歷史的庭園！`] },

  { id:'bamboo', day:1, emoji:'🎋', name:'嵐山竹林（竹林の小径）', type:'景點｜日本音風景百選',

    meta:'📞 075-213-1717（嵐山保勝會）｜嵐電嵐山站步行 5 分｜24 小時・免費',
    guide:[`吃完飯去走走 <strong>嵐山竹林</strong>，位於天龍寺後方，種的是 <strong>孟宗竹</strong>，每根 10 到 20 公尺高，遮天蔽日，形成一條綠色隧道。`,

// ── 地圖（Leaflet，所有景點一次標示） ───────────────────────
const map = L.map('map', { center: [34.78, 135.62], zoom: 10, scrollWheelZoom: true });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19
}).addTo(map);

function makeIcon(color, emoji) {
  const html = `<div style="position:relative;width:30px;height:40px;">
    <svg xmlns="http://www.w3.org/2000/svg" width="30" height="40" viewBox="0 0 28 38" style="position:absolute;top:0;left:0;">
      <path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 24 14 24S28 24.5 28 14C28 6.27 21.73 0 14 0z" fill="${color}" stroke="white" stroke-width="2"/>
    </svg>
    <span style="position:absolute;top:2px;left:0;width:30px;text-align:center;font-size:13px;">${emoji}</span>
  </div>`;
  return L.divIcon({ html, iconSize:[30,40], iconAnchor:[15,40], popupAnchor:[0,-38], className:'' });
}

const markers = {};
let selectedId = null;

SPOTS.forEach(s => {
  const color = DAYS[s.day].color;
  const m = L.marker([s.lat, s.lng], { icon: makeIcon(color, s.emoji), title: s.name }).addTo(map);
  m.bindPopup(`<div style="min-width:170px;">
    <div style="font-weight:800;color:${color};margin-bottom:3px;font-size:0.92rem;">${s.emoji} ${s.name}</div>
    <div style="font-size:0.74rem;color:#666;margin-bottom:5px;">${DAYS[s.day].label}</div>
    <div style="font-size:0.74rem;">${s.type}</div>
    <a href="javascript:void(0)" onclick="openFromMap('${s.id}')" style="display:inline-block;margin-top:7px;color:#4285F4;font-size:0.76rem;font-weight:700;text-decoration:none;">▸ 看照片與導遊解說</a>
  </div>`);
  m.on('click', () => focusSpot(s.id, false));
  markers[s.id] = m;
});

// ── 連結與嵌入 ──────────────────────────────────────────────
function gmapLink(s){ return `https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}`; }
function dirLink(s){ return `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}`; }
function embedSrc(s){ return `https://maps.google.com/maps?q=${s.lat},${s.lng}&t=m&z=16&hl=zh-TW&output=embed&iwloc=near`; }

// ── 卡片建立 ──────────────────────────────────────────────
const sidebar = document.getElementById('sidebar');
const infoPanels = document.getElementById('info-panels');
const countLabel = document.getElementById('count-label');

function buildCards(filterDayVal) {
  sidebar.querySelectorAll('.card, .day-head').forEach(el => el.remove());
  const list = SPOTS.filter(s => filterDayVal==='all' ? true :
    filterDayVal==='5' ? (s.day===0 || s.day===5) : String(s.day)===filterDayVal);
  countLabel.textContent = `顯示 ${list.length} 個景點　·　點卡片或地圖標記看照片・導遊解說・嵌入地圖`;

  let lastDay = null;
  list.forEach(s => {
    if (s.day !== lastDay) {
      const dh = document.createElement('div');
      dh.className = 'day-head';
      dh.style.background = DAYS[s.day].color;
      dh.textContent = DAYS[s.day].label;
      infoPanels.before(dh);
      lastDay = s.day;
    }
    const color = DAYS[s.day].color;
    const photo = PHOTOS[s.id];
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${s.id}`;
    card.style.borderLeftColor = color;
    const guideHtml = s.guide.map(p => `<p>${p}</p>`).join('');
    card.innerHTML = `
      <div class="card-head" onclick="toggleCard('${s.id}')">
        <div class="photo-wrap">${s.emoji}${photo ? `<img src="${photo}" alt="${s.name}" loading="lazy" onerror="this.remove()">` : ''}</div>
        <div class="card-body">
          <div class="card-name">${s.emoji} ${s.name}</div>
          <div class="card-type">${s.type}</div>
          <div class="card-meta">${s.meta}</div>
          ${s.flag ? `<div class="flag-tag">${s.flag}</div>` : ''}
        </div>
        <div class="card-toggle">展開 ▾</div>
      </div>
      <div class="card-detail">
        <div class="guide">${guideHtml}</div>
        <iframe class="embed-map" loading="lazy" data-src="${embedSrc(s)}" allowfullscreen></iframe>
        <div class="card-links">
          <a class="link-btn btn-gmap" href="${gmapLink(s)}" target="_blank" rel="noopener">📍 在 Google Maps 開啟</a>
          <a class="link-btn btn-dir" href="${dirLink(s)}" target="_blank" rel="noopener">🧭 導航路線</a>
          ${s.wiki ? `<a class="link-btn btn-wiki" href="https://${s.wikiLang}.wikipedia.org/wiki/${encodeURIComponent(s.wiki)}" target="_blank" rel="noopener">📖 維基</a>` : ''}
        </div>
      </div>`;
    infoPanels.before(card);
  });

  // 篩選時只顯示對應標記
  SPOTS.forEach(s => {
    const inList = list.some(x => x.id === s.id);
    if (inList) markers[s.id].addTo(map); else map.removeLayer(markers[s.id]);
  });
  if (list.length) {
    const b = L.latLngBounds(list.map(s => [s.lat, s.lng]));
    map.fitBounds(b, { padding: [40, 40], maxZoom: 14 });
  }
}

// ── 卡片互動 ──────────────────────────────────────────────
function toggleCard(id) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  const opening = !card.classList.contains('open');
  card.classList.toggle('open');
  const tog = card.querySelector('.card-toggle');
  if (tog) tog.textContent = opening ? '收起 ▴' : '展開 ▾';
  if (opening) {
    const iframe = card.querySelector('.embed-map');
    if (iframe && !iframe.dataset.loaded) {
      iframe.src = iframe.getAttribute('data-src');
      iframe.dataset.loaded = '1';
    }
  }
  panTo(id);
}

function panTo(id) {
  if (selectedId && document.getElementById(`card-${selectedId}`))
    document.getElementById(`card-${selectedId}`).classList.remove('selected');
  selectedId = id;
  const card = document.getElementById(`card-${id}`);
  if (card) card.classList.add('selected');
  const s = SPOTS.find(x => x.id === id);
  if (s && markers[id]) { map.setView([s.lat, s.lng], 15, { animate: true }); markers[id].openPopup(); }
}

// 點地圖標記：選取卡片並捲到它
function focusSpot(id, scroll) {
  panTo(id);
}
// 點 popup 連結：展開卡片並捲動到它
function openFromMap(id) {
  const card = document.getElementById(`card-${id}`);
  if (!card) { filterDay('all', document.querySelector('.filter-btn[data-day="all"]')); }
  const c = document.getElementById(`card-${id}`);
  if (!c) return;
  if (!c.classList.contains('open')) toggleCard(id);
  c.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── 天數篩選 ──────────────────────────────────────────────
function filterDay(val, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active'); b.style.background = '#fff'; b.style.borderColor = '#ccc'; b.style.color = '#333';
  });
  if (btn) {
    btn.classList.add('active');
    const c = val==='all' ? '#2d7d46' : val==='5' ? '#a05a18' : DAYS[val].color;
    btn.style.background = c; btn.style.borderColor = c; btn.style.color = '#fff';
  }
  buildCards(val);
}
